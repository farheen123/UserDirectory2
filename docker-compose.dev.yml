version: "3.9"

# Development override — mounts source for hot reload
# Usage: docker-compose -f docker-compose.yml -f docker-compose.dev.yml up

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: build          # stop at SDK stage for dotnet watch
    command: dotnet watch --project UserDirectory.Api/UserDirectory.Api.csproj run --urls http://+:5000
    volumes:
      - ./backend:/src
      - db-data:/data
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - DOTNET_USE_POLLING_FILE_WATCHER=1

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:5000/api
    command: npm run dev -- --host 0.0.0.0

volumes:
  db-data:
